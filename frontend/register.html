<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — TodoMaster</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="glass-page">

  <div class="auth-container">
    <div class="auth-card">
      <h2>Create an Account</h2>
      <p class="card-sub">Join TodoMaster and stay organized</p>
      <div class="message-box" id="messageBox" style="display:none;"></div>
      <form onsubmit="event.preventDefault(); registerWithEmail();">
        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="name@company.com" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="••••••••" required />
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password</label>
          <input type="password" id="regConfirm" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <div class="divider"><span>or</span></div>

      <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18" />
        Sign up with Google
      </button>

      <p class="footer-text">
        Already have an account? <a href="index.html">Log in</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
