<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TodoMaster</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="glass-page">

  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="card-sub">Sign in to your TodoMaster account</p>
      <div class="message-box" id="messageBox" style="display:none;"></div>
      <form onsubmit="event.preventDefault(); loginWithEmail();">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="name@company.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>

      <button class="btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18" />
        Continue with Google
      </button>

      <p class="footer-text">
        Don't have an account? <a href="register.html">Sign up</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
</body>

</html>
